<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITTA UT - Portal Pemesanan Bahan Ajar</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; }
    /* Memastikan transisi antar tab mulus */
    .v-enter-active, .v-leave-active { transition: opacity 0.3s; }
    .v-enter, .v-leave-to { opacity: 0; }
  </style>
</head>
<body>

  <div id="app">
    <header>
      <div>
        <h1>SITTA UT</h1>
        <small style="color: var(--gold-light)">Sistem Informasi Transaksi Tiras Bahan Ajar</small>
      </div>
      <nav>
        <button :class="{ active: tab === 'stok' }" @click="tab = 'stok'">Manajemen Stok</button>
        <button :class="{ active: tab === 'tracking' }" @click="tab = 'tracking'">Tracking & Order</button>
      </nav>
    </header>

    <main>
      <transition mode="out-in">
        <section v-if="tab === 'stok'" key="stok">
          <ba-stock-table 
            :items="state.stok" 
            :upbjj-list="state.upbjjList"
            :kategori-list="state.kategoriList"
            @update-stock="handleUpdateStock"
            @delete-stock="handleDeleteStock"
            @create-stock="handleCreateStock">
          </ba-stock-table>
        </section>

        <section v-else-if="tab === 'tracking'" key="tracking">
          <div class="grid-2">
            <div>
              <do-tracking :tracking-list="state.tracking"></do-tracking>
            </div>
            <div>
              <order-form 
                :paket-list="state.paket" 
                :ekspedisi-list="state.pengirimanList"
                @add-do="handleNewDO">
              </order-form>
            </div>
          </div>
        </section>
      </transition>
    </main>

    <app-modal ref="modal"></app-modal>
  </div>

  <template id="tpl-stock">
    <div class="card">
      <h3>Daftar Manajemen Stok Bahan Ajar</h3>
      
      <div class="grid-2" style="margin-top: 15px; background: #1a1a1a; padding: 15px; border-radius: 6px;">
        <div>
          <div class="form-group">
            <label>Filter UT-Daerah</label>
            <select v-model="filters.upbjj">
              <option value="">-- Semua Wilayah --</option>
              <option v-for="u in upbjjList" :key="u" :value="u">{{ u }}</option>
            </select>
          </div>
          <div class="form-group" v-if="filters.upbjj">
            <label>Filter Kategori Mata Kuliah</label>
            <select v-model="filters.kategori">
              <option value="">-- Semua Kategori --</option>
              <option v-for="k in kategoriList" :key="k" :value="k">{{ k }}</option>
            </select>
          </div>
        </div>
        <div>
          <div class="form-group">
            <label>Urutkan Berdasarkan</label>
            <select v-model="sortKey">
              <option value="judul">Judul Buku</option>
              <option value="qty">Jumlah Stok</option>
              <option value="harga">Harga</option>
            </select>
          </div>
          <label style="display:inline-flex; align-items:center; cursor:pointer; margin-top:10px;">
            <input type="checkbox" v-model="filters.warningStock" style="width:auto; margin-right:8px;">
            <span style="color: var(--color-warning); font-size:0.85rem;">Hanya Stok Kritikal</span>
          </label>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Kode</th>
            <th>Judul Bahan Ajar</th>
            <th>UPBJJ</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="item in filteredItems" :key="item.kode">
            <td>{{ item.kode }}</td>
            <td><strong>{{ item.judul }}</strong></td>
            <td>{{ item.upbjj }}</td>
            <td>{{ item.harga | formatCurrency }}</td>
            <td>{{ item.qty }} Eks</td>
            <td><status-badge :qty="item.qty" :safety="item.safety"></status-badge></td>
            <td>
              <button @click="edit(item)" class="btn-gold" style="padding: 5px 10px; font-size:0.7rem;">Edit</button>
              <button @click="remove(item.kode)" class="btn-gold" style="padding: 5px 10px; font-size:0.7rem; background:var(--color-danger);">Hapus</button>
            </td>
          </tr>
        </tbody>
      </table>

<!-- Form Input/Edit (Enter to Save) -->
      <div style="margin-top:30px; padding-top:20px; border-top:1px solid #333;">
        <h4>{{ isEditMode ? 'Edit Data Bahan Ajar' : 'Tambah Stok Baru' }}</h4>
        <form @submit.prevent="save">
          <!-- Menggunakan grid 3 kolom agar input tersusun simetris dan rapi -->
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;">
            <div class="form-group">
              <label>Kode MK</label>
              <input type="text" v-model="form.kode" placeholder="Contoh: EKMA4116" :disabled="isEditMode" required>
            </div>
            <div class="form-group">
              <label>Judul Buku</label>
              <input type="text" v-model="form.judul" placeholder="Masukkan judul bahan ajar" required>
            </div>
            <div class="form-group">
              <label>Wilayah UPBJJ</label>
              <select v-model="form.upbjj" required>
                 <option value="">-- Pilih Wilayah UPBJJ --</option>
                 <option v-for="u in upbjjList" :value="u">{{ u }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Kategori Mata Kuliah</label>
              <select v-model="form.kategori" required>
                 <option value="">-- Pilih Kategori --</option>
                 <option v-for="k in kategoriList" :value="k">{{ k }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Harga Satuan (Rp)</label>
              <input type="number" v-model.number="form.harga" placeholder="Masukkan harga nominal" required>
            </div>
            <div class="form-group">
              <label>Jumlah Stok (Qty)</label>
              <input type="number" v-model.number="form.qty" placeholder="Masukkan jumlah kuantitas" required>
            </div>
          </div>
          
          <div style="text-align: right;">
            <button v-if="isEditMode" type="button" @click="isEditMode = false; resetForm()" class="btn-gold" style="background:#444; color: #fff; margin-right: 10px;">Batal</button>
            <button type="submit" class="btn-gold">{{ isEditMode ? 'Update' : 'Simpan' }} Data (Enter)</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="tpl-tracking">
    <div class="card">
      <h3>Lacak Pengiriman (DO)</h3>
      <br>
      <div class="form-group">
        <input 
          type="text" 
          placeholder="Cari No. DO atau NIM (Enter)..." 
          v-model="searchQuery"
          @keyup.enter="search"
          @keyup.esc="clearSearch">
      </div>

      <div v-if="activeDO" class="card" style="background:#111; border:1px solid var(--gold-primary);">
        <div style="display:flex; justify-content:space-between;">
          <h4>{{ activeDO.id }}</h4>
          <span class="badge badge-safe">{{ activeDO.status }}</span>
        </div>
        <p><small>Penerima:</small> {{ activeDO.nama }} ({{ activeDO.nim }})</p>
        <hr style="border:0; border-top:1px solid #333;">
        <ul style="font-size:0.8rem; color:var(--text-muted); list-style:none; padding:0;">
          <li v-for="p in activeDO.perjalanan" style="margin-bottom:8px;">
            <strong>{{ p.waktu }}</strong>: {{ p.keterangan }}
          </li>
        </ul>
        <div class="form-group" style="margin-top:15px;">
           <input type="text" v-model="newStatusText" placeholder="Update log perjalanan..." @keyup.enter="appendProgress">
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-order">
    <div class="card">
      <h3>Buat DO Baru</h3>
      <div class="form-group">
        <label>NIM Mahasiswa</label>
        <input type="text" v-model="payload.nim">
      </div>
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" v-model="payload.nama">
      </div>
      <div class="form-group">
        <label>Layanan Ekspedisi</label>
        <select v-model="payload.ekspedisi">
          <option value="">-- Pilih --</option>
          <option v-for="e in ekspedisiList" :value="e.nama">{{ e.nama }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Paket Bahan Ajar</label>
        <select v-model="selectedPaketIndex">
          <option value="-1">-- Pilih Paket --</option>
          <option v-for="(p, i) in paketList" :value="i">{{ p.nama }}</option>
        </select>
      </div>
      <button @click="submitDO" class="btn-gold" style="width:100%; margin-top:10px;">Terbitkan Dokumen DO</button>
    </div>
  </template>

<template id="tpl-badge">
  <span :class="['badge', badgeClass]">
    {{ badgeText }}
  </span>
</template>

  <template id="tpl-modal">
    <div v-if="isOpen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; z-index:9999;">
      <div class="card" style="width:350px; border:1px solid var(--gold-primary); text-align:center;">
        <h3 style="margin-bottom:15px;">{{ title }}</h3>
        <p>{{ message }}</p>
        <div style="margin-top:25px; display:flex; gap:10px; justify-content:center;">
          <button @click="close(true)" class="btn-gold" style="background:var(--color-danger);">Hapus</button>
          <button @click="close(false)" class="btn-gold" style="background:#555;">Batal</button>
        </div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="js/services/api.js"></script>
  <script src="js/components/app-components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

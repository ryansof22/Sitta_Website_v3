  <!-- tpl-modal -->
  <template id="tpl-modal">
    <div v-if="isOpen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index:999;">
      <div class="card" style="width:400px; background:var(--bg-card); border:2px solid var(--gold-primary);">
        <h4 style="color:var(--gold-primary); margin-bottom:10px;">{{ title }}</h4>
        <p style="font-size:0.95rem; margin-bottom:20px;">{{ message }}</p>
        <div style="text-align:right;">
          <button @click="close(false)" class="btn-gold" style="background:#555; color:#fff; margin-right:10px;">Batal</button>
          <button @click="close(true)" class="btn-gold" style="background:var(--color-danger); color:#fff;">Ya, Hapus</button>
        </div>
      </div>
    </div>
  </template>

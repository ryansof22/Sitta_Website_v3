<div v-if="isOpen" class="modal-overlay">
    <div class="modal-content">
        <h3>{{ title }}</h3>
        <p>{{ message }}</p>
        <div class="modal-actions" style="margin-top: 20px;">
            <button @click="close" style="background-color: #6c757d; color: white;">Batal</button>
            <button @click="confirm" style="background-color: #dc3545; color: white;">Konfirmasi Hapus</button>
        </div>
    </div>
</div>

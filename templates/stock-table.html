  <!-- tpl-stock -->
  <template id="tpl-stock">
    <div class="card">
      <h3>Daftar Manajemen Stok Bahan Ajar</h3>
      
      <!-- Filter Controls -->
      <div class="grid-2" style="margin-top: 15px; background: #1a1a1a; padding: 15px; border-radius: 6px;">
        <div>
          <div class="form-group">
            <label>Filter UT-Daerah</label>
            <select v-model="filters.upbjj">
              <option value="">-- Semua Wilayah --</option>
              <option v-for="u in upbjjList" :key="u" :value="u">{{ u }}</option>
            </select>
          </div>
          
          <div class="form-group" v-if="filters.upbjj">
            <label>Filter Kategori Mata Kuliah (Dependent Option)</label>
            <select v-model="filters.kategori">
              <option value="">-- Semua Kategori --</option>
              <option v-for="k in kategoriList" :key="k" :value="k">{{ k }}</option>
            </select>
          </div>
        </div>

        <div>
          <div class="form-group">
            <label>Urutkan Berdasarkan</label>
            <select v-model="sortKey">
              <option value="judul">Judul Buku</option>
              <option value="qty">Jumlah Stok</option>
              <option value="harga">Harga</option>
            </select>
          </div>
          <div style="margin-top: 25px;">
            <label style="display:inline-flex; align-items:center; cursor:pointer;">
              <input type="checkbox" v-model="filters.warningStock" style="width:auto; margin-right:8px;">
              <span style="color: var(--color-warning); font-size:0.9rem;">Tampilkan Stok Kritikal (&lt; Safety / Kosong)</span>
            </label>
            <button @click="resetFilters" class="btn-gold" style="padding:4px 10px; font-size:0.8rem; margin-left:15px;">Reset</button>
          </div>
        </div>
      </div>

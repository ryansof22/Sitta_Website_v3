  <!-- tpl-tracking -->
  <template id="tpl-tracking">
    <div class="card">
      <h3>Lacak Pengiriman Delivery Order (DO)</h3>
      
      <!-- Search -->
      <div class="form-group" style="margin-top:15px; display:flex; gap:10px;">
        <input 
          type="text" 
          placeholder="Cari berdasarkan No. DO atau NIM (Enter untuk cari, ESC untuk reset)..." 
          v-model="searchQuery"
          @keyup.enter="search"
          @keyup.esc="clearSearch">
      </div>
